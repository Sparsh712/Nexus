# Render.com deployment configuration for NEXUS Backend
# See https://render.com/docs/blueprint-spec

services:
  - type: web
    name: nexus-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
